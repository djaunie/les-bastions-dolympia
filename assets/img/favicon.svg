<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Fond sombre -->
  <rect width="64" height="64" rx="8" fill="#1a1a1a"/>

  <!-- Engrenage Iron Warriors — or #c8a028 -->
  <g fill="#c8a028" transform="translate(32,32)">
    <!-- Dents de l'engrenage (8 dents) -->
    <path d="
      M-5,-20 L5,-20 L7,-14 L-7,-14 Z
      M-5, 20 L5, 20 L7, 14 L-7, 14 Z
      M-20,-5 L-20,5 L-14,7 L-14,-7 Z
      M 20,-5 L 20,5 L 14,7 L 14,-7 Z
      M-16,-16 L-11,-11 L-15,-7 L-20,-12 Z
      M 16,-16 L 11,-11 L 15,-7 L 20,-12 Z
      M-16, 16 L-11, 11 L-15, 7 L-20, 12 Z
      M 16, 16 L 11, 11 L 15, 7 L 20, 12 Z
    "/>
    <!-- Corps principal de l'engrenage -->
    <circle r="13" fill="#c8a028"/>
    <!-- Trou central -->
    <circle r="5" fill="#1a1a1a"/>
    <!-- Détail : petits trous décoratifs style Iron Warriors -->
    <circle cx="0" cy="0" r="1.5" fill="#c8a028"/>
  </g>
</svg>