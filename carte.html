<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carte du Secteur — Horus Heresy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Cinzel:wght@400;600;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    /* ─── RESET & VARIABLES ─────────────────────────────────────────── */
    :root {
      --gold:        #c9a84c;
      --gold-dim:    #8a6a28;
      --blood:       #8b1a1a;
      --blood-light: #c84040;
      --steel:       #4a4a4a;
      --steel-light: #8a9bac;
      --parchment:   #1a160e;
      --ink:         #0a0806;
      --text-main:   #d4c9a8;
      --text-muted:  #8a7a5a;
      --panel-bg:    rgba(10,8,6,0.97);
      --border:      rgba(201,168,76,0.3);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--ink);
      color: var(--text-main);
      font-family: 'Crimson Text', Georgia, serif;
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* ─── NAVIGATION ────────────────────────────────────────────────── */
    .map-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(10,8,6,0.95);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(8px);
      padding: 0.6rem 1.5rem;
      display: flex; align-items: center; gap: 1rem;
    }
    .map-nav-back {
      display: inline-flex; align-items: center; gap: 0.4rem;
      font-family: 'Cinzel', serif; font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase; text-decoration: none;
      color: var(--gold); border: 1px solid rgba(201,168,76,0.4);
      background: rgba(201,168,76,0.07); border-radius: 3px;
      padding: 0.35rem 0.8rem;
      transition: background 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
    }
    .map-nav-back:hover {
      background: rgba(201,168,76,0.18); border-color: var(--gold);
      box-shadow: 0 0 12px rgba(201,168,76,0.3);
    }
    .map-nav-title {
      font-family: 'UnifrakturMaguntia', serif;
      font-size: 1.3rem; color: var(--gold); letter-spacing: 0.05em;
      text-shadow: 0 0 20px rgba(201,168,76,0.4);
    }
    .map-nav-sub {
      font-family: 'Cinzel', serif; font-size: 0.65rem;
      color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase;
      margin-left: auto;
    }
    .btn-theme-map {
      margin-left: 0.5rem;
      background: none; border: 1px solid var(--border); border-radius: 3px;
      color: var(--gold); padding: 0.35rem 0.5rem; cursor: pointer;
      transition: background 180ms ease;
    }
    .btn-theme-map:hover { background: rgba(201,168,76,0.1); }

    /* ─── LEGEND ────────────────────────────────────────────────────── */
    .map-legend {
      position: fixed; bottom: 1.5rem; left: 1.5rem; z-index: 90;
      background: rgba(10,8,6,0.92); border: 1px solid var(--border);
      border-radius: 4px; padding: 0.75rem 1rem;
      font-family: 'Cinzel', serif; font-size: 0.65rem;
      letter-spacing: 0.06em; text-transform: uppercase;
      backdrop-filter: blur(6px);
      display: flex; flex-direction: column; gap: 0.4rem;
    }
    .map-legend-title {
      color: var(--gold); font-size: 0.6rem; letter-spacing: 0.12em;
      border-bottom: 1px solid var(--border); padding-bottom: 0.3rem;
      margin-bottom: 0.2rem;
    }
    .legend-item { display: flex; align-items: center; gap: 0.5rem; color: var(--text-muted); }
    .legend-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
      border: 1.5px solid rgba(0,0,0,0.5);
    }
    .dot-neutral    { background: #8a9bac; }
    .dot-loyalist   { background: #4a90d9; }
    .dot-traitor    { background: #c84040; }
    .dot-civil_war  { background: #c9a84c; }
    .dot-besieged   { background: #e0e0e0; border: 1.5px dashed #c9a84c; }

    /* ─── MAP CONTAINER ─────────────────────────────────────────────── */
    .map-wrapper {
      padding-top: 52px;
      min-height: 100dvh;
      position: relative;
    }
    .map-container {
      position: relative;
      width: 100%; max-width: 1400px;
      margin: 0 auto;
      aspect-ratio: 1280 / 900;
    }

    /* ─── SVG MAP ───────────────────────────────────────────────────── */
    .map-svg {
      width: 100%; height: 100%;
      display: block;
    }

    /* Étoiles de fond */
    .star { fill: white; opacity: 0; animation: twinkle var(--d, 3s) var(--delay, 0s) infinite alternate ease-in-out; }
    @keyframes twinkle { 0% { opacity: 0.1; } 100% { opacity: var(--max-op, 0.7); } }

    /* Nébuleuse centrale */
    .nebula-core { animation: breathe 6s infinite alternate ease-in-out; }
    @keyframes breathe { 0% { opacity: 0.55; } 100% { opacity: 0.75; } }

    /* Zones de secteur */
    .sector-zone { pointer-events: none; }
    .besieged-zone {
      pointer-events: none;
      stroke-dasharray: 6 4;
      animation: dash-move 2s linear infinite;
    }
    @keyframes dash-move { to { stroke-dashoffset: -20; } }

    /* Nœuds système */
    .system-node { cursor: pointer; }
    .system-node:hover .node-ring { opacity: 1; transform-origin: center; animation: pulse-ring 1s ease-out infinite; }
    @keyframes pulse-ring { 0% { r: 6; opacity: 0.8; } 100% { r: 12; opacity: 0; } }
    .system-node:hover .node-label { font-weight: 700; fill: #fff; }

    .node-dot { transition: r 0.2s ease; }
    .system-node:hover .node-dot { r: 6; }

    /* Couleurs par statut */
    .status-neutral   .node-dot { fill: #8a9bac; }
    .status-loyalist  .node-dot { fill: #4a90d9; }
    .status-traitor   .node-dot { fill: #c84040; }
    .status-civil_war .node-dot { fill: #c9a84c; }
    .status-besieged  .node-dot { fill: #e8e8e8; stroke: #c9a84c; stroke-width: 1.5; stroke-dasharray: 3 2; }

    .status-neutral   .node-glow { fill: rgba(138,155,172,0.15); }
    .status-loyalist  .node-glow { fill: rgba(74,144,217,0.15); }
    .status-traitor   .node-glow { fill: rgba(200,64,64,0.15); }
    .status-civil_war .node-glow { fill: rgba(201,168,76,0.15); }
    .status-besieged  .node-glow { fill: rgba(232,232,232,0.1); }

    .node-label {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      fill: #c4b48a;
      text-anchor: middle;
      pointer-events: none;
      letter-spacing: 0.04em;
    }
    .status-civil_war .node-label { fill: #c9a84c; }
    .status-traitor   .node-label { fill: #e08080; }
    .status-loyalist  .node-label { fill: #90b8e8; }
    .status-besieged  .node-label { fill: #ffffff; }

    .node-icon {
      font-size: 8px;
      fill: rgba(201,168,76,0.7);
      text-anchor: middle;
      dominant-baseline: middle;
      pointer-events: none;
    }

    /* Labels de zones */
    .zone-label {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      fill: rgba(201,168,76,0.5);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      pointer-events: none;
    }

    /* ─── SIDE PANEL ────────────────────────────────────────────────── */
    .side-panel {
      position: fixed; top: 52px; right: 0;
      width: min(380px, 100vw);
      height: calc(100dvh - 52px);
      background: var(--panel-bg);
      border-left: 1px solid var(--border);
      transform: translateX(100%);
      transition: transform 380ms cubic-bezier(0.16,1,0.3,1);
      z-index: 80; overflow-y: auto;
      display: flex; flex-direction: column;
    }
    .side-panel.open { transform: translateX(0); }

    .panel-header {
      padding: 1.5rem 1.5rem 1rem;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0;
      background: var(--panel-bg); z-index: 1;
    }
    .panel-close {
      position: absolute; top: 1rem; right: 1rem;
      background: none; border: 1px solid var(--border);
      color: var(--text-muted); border-radius: 3px;
      width: 28px; height: 28px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; transition: border-color 180ms ease, color 180ms ease;
    }
    .panel-close:hover { border-color: var(--gold); color: var(--gold); }

    .panel-eyebrow {
      font-family: 'Cinzel', serif; font-size: 0.6rem;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 0.4rem;
    }
    .panel-title {
      font-family: 'UnifrakturMaguntia', serif;
      font-size: 1.8rem; color: var(--gold);
      text-shadow: 0 0 20px rgba(201,168,76,0.4);
      line-height: 1.1; margin-bottom: 0.5rem;
    }
    .panel-status-badge {
      display: inline-flex; align-items: center; gap: 0.4rem;
      font-family: 'Cinzel', serif; font-size: 0.65rem;
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 0.25rem 0.7rem; border-radius: 3px; border: 1px solid;
    }
    .badge-neutral   { color: #8a9bac; border-color: rgba(138,155,172,0.4); background: rgba(138,155,172,0.08); }
    .badge-loyalist  { color: #4a90d9; border-color: rgba(74,144,217,0.4);  background: rgba(74,144,217,0.08); }
    .badge-traitor   { color: #c84040; border-color: rgba(200,64,64,0.4);   background: rgba(200,64,64,0.08); }
    .badge-civil_war { color: #c9a84c; border-color: rgba(201,168,76,0.4);  background: rgba(201,168,76,0.08); }
    .badge-besieged  { color: #e0e0e0; border-color: rgba(232,232,232,0.4); background: rgba(232,232,232,0.06); }

    .panel-body { padding: 1.25rem 1.5rem; flex: 1; }

    .panel-faction {
      display: flex; align-items: center; gap: 0.5rem;
      font-family: 'Cinzel', serif; font-size: 0.72rem;
      color: var(--steel-light); letter-spacing: 0.08em;
      margin-bottom: 1.25rem;
    }
    .panel-faction svg { color: var(--gold); }

    .panel-desc {
      font-size: 1rem; line-height: 1.75;
      color: var(--text-muted); text-align: justify;
      border-left: 2px solid var(--border);
      padding-left: 1rem;
    }

    .panel-divider {
      border: none; border-top: 1px solid var(--border);
      margin: 1.25rem 0;
    }

    .panel-coords {
      font-family: 'Cinzel', serif; font-size: 0.6rem;
      color: rgba(138,155,172,0.4); letter-spacing: 0.1em;
      text-transform: uppercase; text-align: right;
    }

    /* Ornement */
    .panel-ornament {
      text-align: center; padding: 0.75rem;
      color: var(--gold); opacity: 0.3; font-size: 0.8rem;
      letter-spacing: 0.3em;
    }

    /* Overlay mobile */
    .map-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 70;
      background: rgba(0,0,0,0.5);
    }
    .map-overlay.active { display: block; }

    /* ─── LOADING STATE ──────────────────────────────────────────────── */
    .map-loading {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1rem;
      font-family: 'Cinzel', serif; font-size: 0.75rem;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--text-muted);
      background: var(--ink);
      z-index: 50;
      transition: opacity 400ms ease;
    }
    .map-loading.hidden { opacity: 0; pointer-events: none; }
    .map-loading-spinner {
      width: 28px; height: 28px;
      border: 2px solid rgba(201,168,76,0.2);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .map-error {
      position: absolute; inset: 0;
      display: none;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 0.75rem;
      font-family: 'Cinzel', serif; font-size: 0.75rem;
      letter-spacing: 0.1em; color: #c84040;
      background: var(--ink);
      z-index: 50;
    }
    .map-error.visible { display: flex; }

    /* ─── LIGHT MODE ─────────────────────────────────────────────────── */
    [data-theme="light"] {
      --ink: #e8e0cc;
      --parchment: #d4c8a8;
      --text-main: #2a1e08;
      --text-muted: #5a4a2a;
      --panel-bg: rgba(240,232,210,0.97);
      --border: rgba(139,90,20,0.3);
    }
    [data-theme="light"] .node-label { fill: #5a4a2a; }
    [data-theme="light"] .status-civil_war .node-label { fill: #7a5a10; }
    [data-theme="light"] .zone-label { fill: rgba(139,90,20,0.5); }
    [data-theme="light"] .map-nav { background: rgba(240,232,210,0.95); }
    [data-theme="light"] .panel-desc { color: #5a4a2a; }
    [data-theme="light"] .map-loading { background: var(--ink); }
    [data-theme="light"] .map-error   { background: var(--ink); }

    /* ─── RESPONSIVE ─────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .map-legend { display: none; }
      .side-panel { width: 100vw; }
      .map-nav-sub { display: none; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav class="map-nav" id="map-nav">
  <a href="index.html" class="map-nav-back" aria-label="Retour à l'accueil">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
    Olympia
  </a>
  <span class="map-nav-title">Secteur Galactique</span>
  <span class="map-nav-sub">Horus Heresy &bull; 31<sup>e</sup> Millénaire</span>
  <button class="btn-theme-map" data-theme-toggle aria-label="Basculer le thème">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>
</nav>

<!-- LÉGENDE -->
<aside class="map-legend" aria-label="Légende de la carte">
  <div class="map-legend-title">Légende</div>
  <div class="legend-item"><span class="legend-dot dot-loyalist"></span>Loyaliste</div>
  <div class="legend-item"><span class="legend-dot dot-traitor"></span>Traître</div>
  <div class="legend-item"><span class="legend-dot dot-civil_war"></span>Guerre Civile</div>
  <div class="legend-item"><span class="legend-dot dot-besieged"></span>Assiégé</div>
  <div class="legend-item"><span class="legend-dot dot-neutral"></span>Neutre</div>
</aside>

<!-- CARTE SVG -->
<main class="map-wrapper">
  <div class="map-container">
    <!-- État de chargement -->
    <div class="map-loading" id="map-loading" aria-live="polite" aria-label="Chargement de la carte">
      <div class="map-loading-spinner"></div>
      <span>Chargement des données…</span>
    </div>
    <!-- État d'erreur -->
    <div class="map-error" id="map-error" role="alert">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="map-error-msg">Impossible de charger carte.json</span>
    </div>

    <svg id="map-svg" class="map-svg" viewBox="0 0 1000 700"
         xmlns="http://www.w3.org/2000/svg"
         role="img" aria-label="Carte interactive du secteur galactique Olympia">
      <defs>
        <!-- Filtre brûlure -->
        <filter id="burn" x="-20%" y="-20%" width="140%" height="140%">
          <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" seed="8" result="noise"/>
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
        <!-- Filtre lueur dorée -->
        <filter id="glow-gold">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <!-- Filtre lueur rouge -->
        <filter id="glow-red">
          <feGaussianBlur stdDeviation="4" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <!-- Gradient nébuleuse centrale -->
        <radialGradient id="nebula-grad" cx="50%" cy="50%" r="50%">
          <stop offset="0%"   stop-color="#3a2010" stop-opacity="0.9"/>
          <stop offset="35%"  stop-color="#1e1208" stop-opacity="0.7"/>
          <stop offset="70%"  stop-color="#0a0806" stop-opacity="0.4"/>
          <stop offset="100%" stop-color="#0a0806" stop-opacity="0"/>
        </radialGradient>
        <!-- Gradient fond étoilé -->
        <radialGradient id="bg-grad" cx="50%" cy="50%" r="70%">
          <stop offset="0%" stop-color="#12100a"/>
          <stop offset="100%" stop-color="#050403"/>
        </radialGradient>
        <!-- Gradient zone Dominion -->
        <linearGradient id="dominion-grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#8b1a1a" stop-opacity="0"/>
          <stop offset="40%" stop-color="#8b1a1a" stop-opacity="0.12"/>
          <stop offset="100%" stop-color="#8b1a1a" stop-opacity="0.18"/>
        </linearGradient>
        <!-- Gradient zone Quantum -->
        <linearGradient id="quantum-grad" x1="100%" y1="100%" x2="0%" y2="0%">
          <stop offset="0%" stop-color="#4a2a6a" stop-opacity="0"/>
          <stop offset="50%" stop-color="#4a2a6a" stop-opacity="0.12"/>
          <stop offset="100%" stop-color="#4a2a6a" stop-opacity="0.2"/>
        </linearGradient>
        <!-- Grille hexagonale subtile -->
        <pattern id="hex-grid" x="0" y="0" width="40" height="34.6" patternUnits="userSpaceOnUse">
          <polygon points="20,0 40,10 40,24.6 20,34.6 0,24.6 0,10"
                   fill="none" stroke="rgba(201,168,76,0.04)" stroke-width="0.5"/>
        </pattern>
      </defs>

      <!-- FOND -->
      <rect width="1000" height="700" fill="url(#bg-grad)"/>
      <rect width="1000" height="700" fill="url(#hex-grid)"/>

      <!-- ÉTOILES (générées par JS) -->
      <g id="stars-layer"></g>

      <!-- ZONES (injectées par JS depuis carte.json) -->
      <g id="zones-layer"></g>

      <!-- LIGNE ORNEMENTALE BORDURE -->
      <rect x="8" y="8" width="984" height="684" rx="2"
            fill="none" stroke="rgba(201,168,76,0.15)" stroke-width="1.5" filter="url(#burn)"/>
      <rect x="14" y="14" width="972" height="672" rx="1"
            fill="none" stroke="rgba(201,168,76,0.08)" stroke-width="0.5"/>

      <!-- SYSTÈMES STELLAIRES (injectés par JS depuis carte.json) -->
      <g id="systems-layer"></g>
    </svg>
  </div>
</main>

<!-- OVERLAY MOBILE -->
<div class="map-overlay" id="map-overlay" aria-hidden="true"></div>

<!-- PANEL LATÉRAL -->
<aside class="side-panel" id="side-panel" role="complementary" aria-label="Détails du système stellaire">
  <div class="panel-header">
    <button class="panel-close" id="panel-close" aria-label="Fermer le panneau">✕</button>
    <p class="panel-eyebrow" id="panel-eyebrow">Système Stellaire</p>
    <h2 class="panel-title" id="panel-title">—</h2>
    <span class="panel-status-badge" id="panel-badge">—</span>
  </div>
  <div class="panel-body">
    <div class="panel-faction">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      <span id="panel-faction">—</span>
    </div>
    <p class="panel-desc" id="panel-desc">—</p>
    <hr class="panel-divider">
    <p class="panel-coords" id="panel-coords">—</p>
    <div class="panel-ornament">⚜ &nbsp; ✦ &nbsp; ⚜</div>
  </div>
</aside>

<script>
(function () {
  'use strict';

  // ── THEME TOGGLE ──────────────────────────────────────────────────
  const root = document.documentElement;
  let theme = root.getAttribute('data-theme') || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  root.setAttribute('data-theme', theme);
  const themeBtn = document.querySelector('[data-theme-toggle]');
  function updateThemeBtn() {
    if (!themeBtn) return;
    themeBtn.innerHTML = theme === 'dark'
      ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
      : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  }
  updateThemeBtn();
  if (themeBtn) themeBtn.addEventListener('click', () => {
    theme = theme === 'dark' ? 'light' : 'dark';
    root.setAttribute('data-theme', theme);
    updateThemeBtn();
  });

  // ── GÉNÉRER ÉTOILES ───────────────────────────────────────────────
  function generateStars() {
    const layer = document.getElementById('stars-layer');
    const count = 280;
    let svg = '';
    for (let i = 0; i < count; i++) {
      const x = Math.random() * 1000;
      const y = Math.random() * 700;
      const r = Math.random() < 0.85 ? (Math.random() * 0.8 + 0.3) : (Math.random() * 1.2 + 0.8);
      const maxOp = (Math.random() * 0.5 + 0.2).toFixed(2);
      const dur = (Math.random() * 3 + 2).toFixed(1);
      const delay = (Math.random() * 4).toFixed(1);
      svg += `<circle class="star" cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${r.toFixed(1)}" style="--d:${dur}s;--delay:${delay}s;--max-op:${maxOp}"/>`;
    }
    layer.innerHTML = svg;
  }

  // ── ICÔNES STATUT ─────────────────────────────────────────────────
  const ICONS = {
    neutral:   '◎',
    loyalist:  '✦',
    traitor:   '✕',
    civil_war: '⚔',
    besieged:  '🔒'
  };
  const STATUS_FR = {
    neutral:   'Neutre',
    loyalist:  'Loyaliste',
    traitor:   'Traître',
    civil_war: 'Guerre Civile',
    besieged:  'Assiégé'
  };

  // ── PANEL ─────────────────────────────────────────────────────────
  const panel   = document.getElementById('side-panel');
  const overlay = document.getElementById('map-overlay');

  function openPanel(item, type) {
    const eyebrow = type === 'zone' ? 'Zone Galactique' : 'Système Stellaire';
    document.getElementById('panel-eyebrow').textContent = eyebrow;
    document.getElementById('panel-title').textContent   = item.nom;
    document.getElementById('panel-faction').textContent = item.faction || item.type || '—';
    document.getElementById('panel-desc').textContent    = item.description || '—';
    if (type === 'zone') {
      document.getElementById('panel-coords').textContent = `Type : ${item.type || '—'}`;
      const badge = document.getElementById('panel-badge');
      badge.textContent = item.type || '—';
      badge.className   = 'panel-status-badge badge-neutral';
    } else {
      document.getElementById('panel-coords').textContent =
        `Coordonnées : ${item.x_pct.toFixed(1)}% × ${item.y_pct.toFixed(1)}%`;
      const badge = document.getElementById('panel-badge');
      badge.textContent = (ICONS[item.statut] || '◎') + ' ' + (STATUS_FR[item.statut] || item.statut);
      badge.className   = 'panel-status-badge badge-' + item.statut;
    }
    panel.classList.add('open');
    overlay.classList.add('active');
    overlay.setAttribute('aria-hidden', 'false');
  }

  function closePanel() {
    panel.classList.remove('open');
    overlay.classList.remove('active');
    overlay.setAttribute('aria-hidden', 'true');
  }

  document.getElementById('panel-close').addEventListener('click', closePanel);
  overlay.addEventListener('click', closePanel);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });

  // ── RENDER ZONES ─────────────────────────────────────────────────
  function renderZones(zones) {
    const layer = document.getElementById('zones-layer');
    let svg = '';
    zones.forEach(zone => {
      const couleur = zone.couleur || '#888888';
      const opacite = zone.opacite || 0.1;

      if (zone.type === 'nebula') {
        // Ellipse nébuleuse
        const cx = (zone.cx_pct / 100) * 1000;
        const cy = (zone.cy_pct / 100) * 700;
        const rx = (zone.rx_pct / 100) * 1000;
        const ry = (zone.ry_pct / 100) * 700;
        svg += `
          <ellipse cx="${cx}" cy="${cy}" rx="${rx}" ry="${ry}"
                   fill="${couleur}" opacity="${opacite}" class="nebula-core"
                   data-zone-id="${zone.id}" style="cursor:pointer;"/>
          <ellipse cx="${cx}" cy="${cy}" rx="${rx * 0.71}" ry="${ry * 0.71}"
                   fill="rgba(20,12,4,0.5)" class="nebula-core" pointer-events="none"/>
          <text x="${cx}" y="${cy + ry * 0.95}"
                class="zone-label" text-anchor="middle"
                font-family="UnifrakturMaguntia, serif" font-size="22"
                fill="rgba(201,168,76,0.35)" letter-spacing="0.1em"
                pointer-events="none">${zone.nom}</text>`;
      } else if (zone.type === 'besieged') {
        // Zone assiégée : rectangle délimité par les points
        const pts = zone.points.split(' ').map(p => p.split(',').map(Number));
        const xs = pts.map(p => (p[0] / 100) * 1000);
        const ys = pts.map(p => (p[1] / 100) * 700);
        const x  = Math.min(...xs);
        const y  = Math.min(...ys);
        const w  = Math.max(...xs) - x;
        const h  = Math.max(...ys) - y;
        svg += `
          <rect x="${x}" y="${y}" width="${w}" height="${h}" rx="8"
                fill="rgba(201,168,76,0.06)"
                stroke="rgba(201,168,76,0.5)" stroke-width="1.5"
                stroke-dasharray="6 4" class="besieged-zone"
                data-zone-id="${zone.id}" style="cursor:pointer;"/>
          <text x="${x + w/2}" y="${y - 4}"
                class="zone-label" text-anchor="middle"
                fill="rgba(201,168,76,0.7)" font-size="9" letter-spacing="0.2em"
                pointer-events="none">⚔ ASSIÉGÉ ⚔</text>`;
      } else {
        // Zones secteur : polygone avec points en %
        const svgPoints = zone.points.split(' ')
          .map(p => { const [px, py] = p.split(',').map(Number); return `${(px/100)*1000},${(py/100)*700}`; })
          .join(' ');
        svg += `
          <polygon points="${svgPoints}"
                   fill="${couleur}" opacity="${opacite}" class="sector-zone"
                   data-zone-id="${zone.id}" style="cursor:pointer;"/>`;
        // Label positionné à partir du premier point
        const firstPt = zone.points.split(' ')[0].split(',').map(Number);
        const lx = (firstPt[0] / 100) * 1000 + 20;
        const ly = (firstPt[1] / 100) * 700 + 60;
        svg += `
          <text x="${lx}" y="${ly}" class="zone-label"
                fill="${couleur.replace(')', ', 0.5)').replace('rgb', 'rgba').replace('#', 'rgba(').replace(')', '') || 'rgba(201,168,76,0.5)'}"
                font-style="italic" pointer-events="none">${zone.nom}</text>`;
      }
    });
    layer.innerHTML = svg;

    // Événements click sur les zones
    layer.querySelectorAll('[data-zone-id]').forEach(el => {
      const id   = el.getAttribute('data-zone-id');
      const zone = zones.find(z => z.id === id);
      if (!zone) return;
      el.addEventListener('click', () => openPanel(zone, 'zone'));
    });
  }

  // ── RENDER SYSTÈMES ───────────────────────────────────────────────
  function renderSystems(systemes) {
    const layer = document.getElementById('systems-layer');
    let svg = '';
    systemes.forEach(sys => {
      const x    = (sys.x_pct / 100) * 1000;
      const y    = (sys.y_pct / 100) * 700;
      const icon = ICONS[sys.statut] || '◎';
      svg += `
        <g class="system-node status-${sys.statut}"
           data-id="${sys.id}"
           role="button" tabindex="0"
           aria-label="${sys.nom} — ${STATUS_FR[sys.statut] || sys.statut}"
           transform="translate(${x.toFixed(1)},${y.toFixed(1)})">
          <circle class="node-glow" cx="0" cy="0" r="14"/>
          <circle class="node-ring" cx="0" cy="0" r="6" fill="none"
                  stroke="currentColor" stroke-width="1" opacity="0"/>
          <circle class="node-dot" cx="0" cy="0" r="4"/>
          <text class="node-icon" x="0" y="-8" font-size="7">${icon}</text>
          <text class="node-label" x="0" y="15" font-size="9">${sys.nom}</text>
        </g>`;
    });
    layer.innerHTML = svg;

    layer.querySelectorAll('.system-node').forEach(node => {
      const id  = node.dataset.id;
      const sys = systemes.find(s => s.id === id);
      if (!sys) return;
      node.addEventListener('click',   () => openPanel(sys, 'system'));
      node.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openPanel(sys, 'system'); } });
    });
  }

  // ── FETCH & INIT ──────────────────────────────────────────────────
  const loadingEl = document.getElementById('map-loading');
  const errorEl   = document.getElementById('map-error');
  const errorMsg  = document.getElementById('map-error-msg');

  generateStars();

  fetch('assets/data/carte.json')
    .then(res => {
      if (!res.ok) throw new Error(`HTTP ${res.status} — ${res.statusText}`);
      return res.json();
    })
    .then(data => {
      // Mise à jour du titre depuis les métadonnées
      if (data.meta) {
        const titleEl = document.querySelector('.map-nav-title');
        if (titleEl && data.meta.titre) titleEl.textContent = data.meta.titre;
        const subEl = document.querySelector('.map-nav-sub');
        if (subEl && data.meta.epoque) subEl.innerHTML = data.meta.epoque;
      }
      // Rendu des zones puis des systèmes
      if (Array.isArray(data.zones))    renderZones(data.zones);
      if (Array.isArray(data.systemes)) renderSystems(data.systemes);
      // Masquer le loader
      loadingEl.classList.add('hidden');
      setTimeout(() => { loadingEl.style.display = 'none'; }, 450);
    })
    .catch(err => {
      console.error('[carte.json]', err);
      loadingEl.style.display = 'none';
      errorMsg.textContent = `Impossible de charger carte.json\u00a0: ${err.message}`;
      errorEl.classList.add('visible');
    });

})();
</script>
</body>
</html>
